steps:
  # Build Docker image (tagged with COMMIT_SHA for traceability)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--no-cache'
      - '--build-arg'
      - 'COMMIT_SHA=$COMMIT_SHA'
      - '-t'
      - 'gcr.io/super-flashcards-475210/super-flashcards:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/super-flashcards-475210/super-flashcards:latest'
      - '-f'
      - 'backend/Dockerfile'
      - '.'
    id: 'build'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/super-flashcards-475210/super-flashcards:$COMMIT_SHA'
    id: 'push'
    waitFor: ['build']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/super-flashcards-475210/super-flashcards:latest'
    waitFor: ['build']

  # MP132 BUG-132-FIX: Changed --set-env-vars to --update-env-vars.
  # --set-env-vars REPLACES all env vars; --update-env-vars only adds/updates GIT_SHA.
  # Root cause of AIGEN1 openai-api-key drop was --set-env-vars in a prior deploy.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'super-flashcards'
      - '--image'
      - 'gcr.io/super-flashcards-475210/super-flashcards:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--update-env-vars'
      - 'GIT_SHA=$COMMIT_SHA'
    id: 'deploy'
    waitFor: ['push']

  # MP132 BV-13: Post-deploy hardening gate â€” verify required state survived deploy.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        SERVICE="super-flashcards"
        REQUIRED="GIT_SHA,SQL_PASSWORD,APP_PASSPHRASE,OPENAI_API_KEY"
        echo "[HARDENGATE] Post-deploy state check: service=$$SERVICE sha=$COMMIT_SHA"
        ENV_JSON=$(gcloud run services describe "$$SERVICE" \
          --region=us-central1 \
          --format="json(spec.template.spec.containers[0].env)")
        PRESENT=$(echo "$$ENV_JSON" | python3 -c "
        import json,sys
        d=json.load(sys.stdin)
        envs=(d.get('spec') or {}).get('template',{}).get('spec',{}).get('containers',[{}])[0].get('env',[])
        print('\n'.join(e.get('name','') for e in envs))
        ")
        MISSING=""
        IFS=',' read -ra VARS <<< "$$REQUIRED"
        for VAR in "$${VARS[@]}"; do
          if echo "$$PRESENT" | grep -qx "$$VAR"; then
            echo "[HARDENGATE][OK]   $$VAR present"
          else
            echo "[HARDENGATE][FAIL] MISSING: $$VAR"
            MISSING="$$MISSING $$VAR"
          fi
        done
        if [ -n "$$MISSING" ]; then
          echo "[HARDENGATE][FAIL] Gate failed â€” missing:$$MISSING"
          exit 1
        fi
        echo "[HARDENGATE][PASS] All required state confirmed for $$SERVICE"
    id: 'hardengate'
    waitFor: ['deploy']

  # Warm-on-deploy ingest. Fails the build loudly if ingest fails (set -e).
  - name: 'python:3.11-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        pip install -q pymssql
        python ingest_code.py --app super-flashcards --repo-root . --sha $COMMIT_SHA --trigger-src cloudbuild
        echo "MP132: ingest completed for super-flashcards sha=$COMMIT_SHA"
    env:
      - 'DB_HOST=steps:
