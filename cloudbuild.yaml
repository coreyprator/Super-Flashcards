        echo "[HARDENGATE][PASS] All required state confirmed for $$SERVICE"
    id: 'hardengate'
    waitFor: ['deploy']

  # Warm-on-deploy ingest. Fails the build loudly if ingest fails (set -e).
  - name: 'python:3.11-slim'
